name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build tarball + publish GitHub release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Tarball (excluding .git)
        run: |
          mkdir -p dist
          tar --exclude='.git' \
              --exclude='dist' \
              -czf "dist/codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz" \
              -C "$GITHUB_WORKSPACE" .
          ls -la "dist/codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz"

      - name: Checksums
        run: |
          cd dist
          shasum -a 256 "codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz" \
              > "codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz.sha256"
          cat "codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "codex-img-prep v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz
            dist/codex-img-prep-v${{ steps.version.outputs.version }}.tar.gz.sha256