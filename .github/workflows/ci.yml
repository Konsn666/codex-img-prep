name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: macos-latest   # sips + macOS-only code path; runs where the tool runs
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Lint shell scripts
        run: |
          set -e
          echo "=== shellcheck bin/*.sh ==="
          shellcheck -x bin/codex-img-prep bin/codex-clip-watch.sh
          echo "=== shellcheck install.sh ==="
          shellcheck -x install.sh
          echo "✓ all scripts pass shellcheck"

  syntax-check:
    name: Bash syntax
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n every script
        run: |
          set -e
          for f in bin/*.sh install.sh; do
              echo "checking $f"
              bash -n "$f"
          done
          echo "✓ all scripts parse cleanly"

  plist-check:
    name: plutil validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate LaunchAgent + Quick Action plists
        run: |
          set -e
          plutil -lint launchd/com.user.codex-clipprep.plist
          plutil -lint "workflow/Compress for Codex.workflow/Contents/Info.plist"
          plutil -lint "workflow/Compress for Codex.workflow/Contents/document.wflow"
          echo "✓ all plists valid"

  sql-syntax:
    name: SQLite syntax
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse SQL syntax (create dummy schema, run SELECT only)
        run: |
          # Run only the SELECT (the UPDATE targets the user's local DB).
          awk '/^SELECT/{flag=1} flag' cc-switch-fix.sql > /tmp/check.sql
          # Provide a minimal schema so the SELECT has something to read.
          sqlite3 :memory: <<EOF
          CREATE TABLE providers (
              id TEXT NOT NULL,
              app_type TEXT NOT NULL,
              meta TEXT NOT NULL DEFAULT '{}',
              PRIMARY KEY (id, app_type)
          );
          INSERT INTO providers VALUES
              ('b838cc0d-0d4e-4ad1-a671-7d1be8ba78f4','codex',
               '{"apiFormat":"openai_chat"}');
          $(cat /tmp/check.sql)
          EOF
          echo "✓ SQL syntax valid"